name: Build & Release

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Create Github Release?'
        type: boolean
        required: true
        default: false
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: false
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pystray Pillow psutil pyperclip cryptography websockets

      - name: Install pyinstaller
        run: pip install "pyinstaller==6.13.0"

      - name: Build EXE with PyInstaller
        run: pyinstaller packaging/windows.spec --noconfirm

      - name: Rename artifact
        run: mv dist/TgWsProxy.exe dist/TgWsProxy_windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: TgWsProxy
          path: dist/TgWsProxy_windows.exe

  build-win7:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            suffix: 64bit
          - arch: x86
            suffix: 32bit
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.8"
          architecture: ${{ matrix.arch }}
          cache: "pip"
          
      - name: Install dependencies & pyinstaller
        run: pip install . "pyinstaller==5.13.2"

      - name: Build EXE with PyInstaller
        run: pyinstaller packaging/windows.spec --noconfirm

      - name: Rename artifact
        run: mv dist/TgWsProxy.exe dist/TgWsProxy_windows_7_${{ matrix.suffix }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: TgWsProxy-win7-${{ matrix.suffix }}
          path: dist/TgWsProxy_windows_7_${{ matrix.suffix }}.exe

  